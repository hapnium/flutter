name: multimedia
description: A Flutter plugin that retrieves images and videos from mobile native multimedia.

publish_to: none

version: 0.1.7
homepage: https://github.com/Hapnium/flutter/tree/main/multimedia
repository: https://github.com/Hapnium/flutter/tree/main/multimedia

environment:
  sdk: ">=3.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0+2
  file_picker: ^11.0.2

  gallery:
    path: ../gallery

dev_dependencies:
  tracing:
    path: ../tracing
  smart:
    path: ../smart
  lints: ^6.1.0