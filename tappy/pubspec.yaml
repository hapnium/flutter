name: tappy
description: "Notification (In-App and Device) management for Hapnium mobile platforms."

publish_to: none

version: 0.4.4
homepage: https://github.com/Hapnium/flutter/tree/main/tappy
repository: https://github.com/Hapnium/flutter/tree/main/tappy

environment:
  sdk: ^3.0.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  fluttertoast: ^9.1.0
  timezone: ^0.11.1
  toastification: ^3.2.0

  tracing:
    path: ../tracing

dev_dependencies:
  lints: ^6.1.0